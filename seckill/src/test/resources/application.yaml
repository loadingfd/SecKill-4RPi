spring:
  datasource:
    url: jdbc:h2:mem:seckill;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    listener:
      simple:
        auto-startup: false
  cloud:
    nacos:
      discovery:
        enabled: false
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:true}
management:
  endpoints:
    enabled-by-default: false
