spring:
  application:
    name: seckill
  datasource:
    url: jdbc:postgresql://${PC_HOST:localhost}:${POSTGRES_PORT:5432}/seckill_db
    username: ${POSTGRES_USER:cbk}
    password: ${POSTGRES_PASSWORD:cbksb6677}
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: ${PC_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:cbksb}
      timeout: 3000ms
  rabbitmq:
    host: ${PC_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:cbk}
    password: ${RABBITMQ_PASSWORD:cbksb6677}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: ${SECKILL_CONSUMER_PREFETCH:100}
        default-requeue-rejected: false
  cloud:
    nacos:
      discovery:
        server-addr: ${PC_HOST:localhost}:${NACOS_PORT:8848}
        group: ${NACOS_GROUP:SECKILL_GROUP}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        ip: ${INSTANCE_IP:}
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:true}

server:
  port: ${SERVER_PORT:8080}

authority:
  limiter:
    qps: ${SECKILL_QPS:3000}

seckill:
  stock-key-prefix: "seckill:stock:"
  user-key-prefix: "seckill:users:"
  publisher:
    max-attempts: ${SECKILL_PUBLISH_MAX_ATTEMPTS:3}
    base-delay-ms: ${SECKILL_PUBLISH_BASE_DELAY_MS:200}
  consumer:
    order-concurrency: ${SECKILL_ORDER_CONCURRENCY:8-16}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
