spring:
  application:
    name: seckill

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://${PC_HOST:localhost}:${POSTGRES_PORT:5432}/seckill_db
    username: ${POSTGRES_USER:cbk}
    password: ${POSTGRES_PASSWORD:cbksb6677}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:8}
      minimum-idle: ${DB_MIN_IDLE:2}
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${PC_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:cbksb}
      timeout: ${REDIS_TIMEOUT:3000ms}

  rabbitmq:
    host: ${PC_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:cbk}
    password: ${RABBITMQ_PASSWORD:cbksb6677}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: ${SECKILL_CONSUMER_PREFETCH:50}
        default-requeue-rejected: false
        concurrency: 4


  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:48}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:2}
    accept-count: ${TOMCAT_ACCEPT_COUNT:20}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:5000}


seckill:
  stock-key-prefix: "seckill:stock:"
  user-count-key-prefix: "seckill:user:count:"
  user-limit-key-prefix: "seckill:user:limit:"
  publisher:
    max-attempts: ${SECKILL_PUBLISH_MAX_ATTEMPTS:3}
    base-delay-ms: ${SECKILL_PUBLISH_BASE_DELAY_MS:200}
  consumer:
    order-concurrency: ${SECKILL_ORDER_CONCURRENCY:2-4}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
  endpoint:
    health:
      show-details: always
