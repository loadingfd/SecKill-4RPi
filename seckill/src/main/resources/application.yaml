spring:
  application:
    name: seckill
  datasource:
    url: jdbc:postgresql://${PC_HOST:localhost}:${POSTGRES_PORT:5432}/seckill_db
    username: ${POSTGRES_USER:cbk}
    password: ${POSTGRES_PASSWORD:cbksb6677}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:8}
      minimum-idle: ${DB_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: ${JPA_BATCH_SIZE:20}
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${PC_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:cbksb}
      timeout: ${REDIS_TIMEOUT:3000ms}
  rabbitmq:
    host: ${PC_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:cbk}
    password: ${RABBITMQ_PASSWORD:cbksb6677}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: ${SECKILL_CONSUMER_PREFETCH:8}
        default-requeue-rejected: false

  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${PC_HOST:localhost}:${NACOS_PORT:8848}
        group: ${NACOS_GROUP:SECKILL_GROUP}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        ip: ${INSTANCE_IP:}
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:48}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:2}
    accept-count: ${TOMCAT_ACCEPT_COUNT:20}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:5000}


seckill:
  stock-key-prefix: "seckill:stock:"
  user-key-prefix: "seckill:users:"
  publisher:
    max-attempts: ${SECKILL_PUBLISH_MAX_ATTEMPTS:3}
    base-delay-ms: ${SECKILL_PUBLISH_BASE_DELAY_MS:200}
  consumer:
    order-concurrency: ${SECKILL_ORDER_CONCURRENCY:2-4}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

