spring:
  application:
    name: seckill
  datasource:
    url: jdbc:postgresql://${PC_HOST:192.168.137.1}:${POSTGRES_PORT:5432}/seckill_db
    username: ${POSTGRES_USER:cbk}
    password: ${POSTGRES_PASSWORD:cbksb6677}
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: ${PC_HOST:192.168.137.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:cbksb}
      timeout: 3000ms
  rabbitmq:
    host: ${PC_HOST:192.168.137.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:cbk}
    password: ${RABBITMQ_PASSWORD:cbksb6677}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 50
        default-requeue-rejected: false
  cloud:
    nacos:
      discovery:
        server-addr: ${PC_HOST:192.168.137.1}:${NACOS_PORT:8848}
        group: ${NACOS_GROUP:SECKILL_GROUP}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        ip: ${INSTANCE_IP:}
        instance-id: ${INSTANCE_ID:${HOSTNAME:unknown}-${server.port}}

server:
  port: ${SERVER_PORT:8080}

authority:
  limiter:
    qps: ${SECKILL_QPS:3000}

seckill:
  stock-key-prefix: "seckill:stock:"
  user-key-prefix: "seckill:users:"
  outbox-max-retry: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
